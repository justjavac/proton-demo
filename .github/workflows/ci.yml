name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "$env:USERPROFILE\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Show tool versions
        shell: pwsh
        run: |
          moon version
          moonc -v

      - name: Update package index
        shell: pwsh
        run: moon update

      - name: Install Proton CLI
        shell: pwsh
        run: |
          moon install justjavac/proton_cli@0.1.4
          proton_cli --help

      - name: Prepare Proton runtime
        shell: pwsh
        run: proton_cli cef setup

      - name: Check
        shell: pwsh
        run: moon check --target native

      - name: Build
        shell: pwsh
        run: moon build app --target native
