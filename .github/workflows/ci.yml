name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "$env:USERPROFILE\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Show tool versions
        shell: pwsh
        run: |
          moon version
          moonc -v

      - name: Update package index
        shell: pwsh
        run: moon update

      - name: Install Proton CLI
        if: runner.os != 'Windows'
        shell: pwsh
        run: |
          moon install justjavac/proton_cli@0.1.4
          proton_cli --help

      - name: Check
        if: runner.os != 'Windows'
        shell: pwsh
        run: moon check --target native

      - name: Build
        if: runner.os != 'Windows'
        shell: pwsh
        run: moon build app --target native

      - name: Build with Proton runtime
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VS_INSTALL=%%i"
          call "%VS_INSTALL%\Common7\Tools\VsDevCmd.bat" -arch=x64
          moon install justjavac/proton_cli@0.1.4
          proton_cli --help
          proton_cli cef setup
          moon check --target native
          moon build app --target native
