name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "$env:USERPROFILE\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Show tool versions
        shell: pwsh
        run: |
          moon version
          moonc -v

      - name: Update package index
        shell: pwsh
        run: moon update

      - name: Install Proton CLI
        if: runner.os != 'Windows'
        shell: pwsh
        run: |
          moon install justjavac/proton_cli
          proton_cli --help

      - name: Check
        shell: pwsh
        run: moon check --target native

      - name: Inspect Proton native artifacts
        shell: pwsh
        run: |
          $rid = switch ($env:RUNNER_OS) {
            'Windows' { 'win32-x64' }
            'macOS' { 'darwin-arm64' }
            default { 'linux-x64' }
          }
          $paths = @(
            ".mooncakes/justjavac/proton/prebuilt/$rid",
            ".mooncakes/justjavac/native/dist"
          )
          foreach ($path in $paths) {
            if (Test-Path $path) {
              Write-Host "found: $path"
              Get-ChildItem -Recurse $path | Select-Object -First 40 FullName, Length
            } else {
              Write-Host "missing: $path"
            }
          }

      - name: Build diagnostic
        if: runner.os != 'Windows'
        continue-on-error: true
        shell: pwsh
        run: moon build app --target native

      - name: Install Proton CLI
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VS_INSTALL=%%i"
          call "%VS_INSTALL%\Common7\Tools\VsDevCmd.bat" -arch=x64
          moon install justjavac/proton_cli
          proton_cli --help

      - name: Build diagnostic
        if: runner.os == 'Windows'
        continue-on-error: true
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VS_INSTALL=%%i"
          call "%VS_INSTALL%\Common7\Tools\VsDevCmd.bat" -arch=x64
          moon build app --target native

      - name: CEF setup diagnostic
        continue-on-error: true
        shell: pwsh
        run: |
          proton_cli cef setup
