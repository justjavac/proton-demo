<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <style>
            :root {
                color-scheme: light;
                --bg: #f5f7f8;
                --panel: #ffffff;
                --panel-alt: #eef3f2;
                --line: #d8e0e3;
                --ink: #1f2933;
                --muted: #63717a;
                --accent: #087f7a;
                --accent-ink: #ffffff;
                --warm: #b45309;
                --danger: #b42318;
                --shadow: rgba(31, 41, 51, 0.1);
            }

            [data-theme="dark"] {
                color-scheme: dark;
                --bg: #101417;
                --panel: #171d21;
                --panel-alt: #1f292e;
                --line: #344149;
                --ink: #edf2f4;
                --muted: #a7b4bb;
                --accent: #2dd4bf;
                --accent-ink: #071011;
                --warm: #f59e0b;
                --danger: #fb7185;
                --shadow: rgba(0, 0, 0, 0.32);
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                background: var(--bg);
                color: var(--ink);
                font-family:
                    Inter, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont,
                    sans-serif;
            }

            button,
            input {
                font: inherit;
            }

            .app {
                width: min(960px, calc(100vw - 32px));
                margin: 24px auto;
                display: grid;
                gap: 16px;
            }

            .topbar,
            .panel,
            .task {
                border: 1px solid var(--line);
                border-radius: 8px;
                background: var(--panel);
                box-shadow: 0 12px 28px var(--shadow);
            }

            .topbar {
                min-height: 80px;
                padding: 18px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 16px;
            }

            h1,
            h2,
            p {
                margin: 0;
            }

            h1 {
                font-size: 24px;
                line-height: 1.2;
            }

            h2 {
                font-size: 16px;
                line-height: 1.2;
            }

            .muted {
                color: var(--muted);
            }

            .toolbar {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
                justify-content: flex-end;
            }

            .grid {
                display: grid;
                grid-template-columns: minmax(0, 1.25fr) minmax(280px, 0.75fr);
                gap: 16px;
            }

            .panel {
                padding: 16px;
                display: grid;
                gap: 14px;
            }

            .stats {
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 10px;
            }

            .stat {
                min-height: 82px;
                padding: 12px;
                border: 1px solid var(--line);
                border-radius: 8px;
                background: var(--panel-alt);
                display: grid;
                align-content: space-between;
            }

            .stat strong {
                font-size: 24px;
                line-height: 1;
            }

            .row {
                display: grid;
                grid-template-columns: minmax(0, 1fr) auto;
                gap: 8px;
            }

            input {
                width: 100%;
                min-height: 40px;
                border: 1px solid var(--line);
                border-radius: 8px;
                background: var(--panel);
                color: var(--ink);
                padding: 0 12px;
            }

            button {
                min-height: 40px;
                border: 1px solid transparent;
                border-radius: 8px;
                padding: 0 14px;
                background: var(--accent);
                color: var(--accent-ink);
                cursor: pointer;
                font-weight: 600;
            }

            button.secondary {
                background: var(--panel-alt);
                color: var(--ink);
                border-color: var(--line);
            }

            button.warm {
                background: var(--warm);
                color: #ffffff;
            }

            button.danger {
                background: transparent;
                color: var(--danger);
                border-color: var(--line);
            }

            .tasks {
                display: grid;
                gap: 8px;
                min-height: 216px;
                align-content: start;
            }

            .task {
                min-height: 52px;
                padding: 10px;
                display: grid;
                grid-template-columns: auto minmax(0, 1fr) auto;
                align-items: center;
                gap: 10px;
                box-shadow: none;
            }

            .task input {
                width: 18px;
                min-height: 18px;
                accent-color: var(--accent);
            }

            .task.done span {
                color: var(--muted);
                text-decoration: line-through;
            }

            .empty {
                min-height: 216px;
                border: 1px dashed var(--line);
                border-radius: 8px;
                display: grid;
                place-items: center;
                color: var(--muted);
            }

            .log {
                min-height: 168px;
                max-height: 168px;
                overflow: auto;
                border: 1px solid var(--line);
                border-radius: 8px;
                background: var(--panel-alt);
                padding: 10px;
                display: grid;
                align-content: start;
                gap: 6px;
                font-family: "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
                font-size: 12px;
            }

            .log div {
                white-space: nowrap;
            }

            @media (max-width: 760px) {
                .topbar {
                    align-items: flex-start;
                    flex-direction: column;
                }

                .toolbar {
                    justify-content: flex-start;
                }

                .grid,
                .stats {
                    grid-template-columns: 1fr;
                }
            }
        </style>
    </head>
    <body>
        <main class="app">
            <header class="topbar">
                <div>
                    <h1>Proton Starter</h1>
                    <p class="muted" id="subtitle">Native window ready</p>
                </div>
                <div class="toolbar">
                    <button id="tick">Count</button>
                    <button id="theme" class="secondary">Theme</button>
                    <button id="reset" class="danger">Reset</button>
                </div>
            </header>

            <section class="grid">
                <div class="panel">
                    <h2>Tasks</h2>
                    <form class="row" id="taskForm">
                        <input id="taskInput" placeholder="New task" autocomplete="off" />
                        <button>Add</button>
                    </form>
                    <div id="tasks" class="tasks"></div>
                </div>

                <aside class="panel">
                    <h2>Session</h2>
                    <div class="stats">
                        <div class="stat">
                            <span class="muted">Clicks</span>
                            <strong id="count">0</strong>
                        </div>
                        <div class="stat">
                            <span class="muted">Tasks</span>
                            <strong id="taskCount">0</strong>
                        </div>
                        <div class="stat">
                            <span class="muted">Done</span>
                            <strong id="doneCount">0</strong>
                        </div>
                    </div>
                    <div class="stat">
                        <span class="muted">Clock</span>
                        <strong id="clock">--:--:--</strong>
                    </div>
                    <div class="log" id="log"></div>
                </aside>
            </section>
        </main>

        <script>
            const state = {
                count: 0,
                nextTaskId: 3,
                theme: "light",
                tasks: [
                    { id: 1, title: "Create a Proton window", done: true },
                    { id: 2, title: "Edit embedded HTML", done: false },
                ],
            };

            const elements = {
                count: document.getElementById("count"),
                taskCount: document.getElementById("taskCount"),
                doneCount: document.getElementById("doneCount"),
                clock: document.getElementById("clock"),
                log: document.getElementById("log"),
                tasks: document.getElementById("tasks"),
                taskInput: document.getElementById("taskInput"),
            };

            function addLog(message) {
                const line = document.createElement("div");
                line.textContent = new Date().toLocaleTimeString() + "  " + message;
                elements.log.prepend(line);
                while (elements.log.children.length > 10) {
                    elements.log.removeChild(elements.log.lastElementChild);
                }
            }

            function renderStats() {
                elements.count.textContent = String(state.count);
                elements.taskCount.textContent = String(state.tasks.length);
                elements.doneCount.textContent = String(
                    state.tasks.filter((task) => task.done).length,
                );
            }

            function renderTasks() {
                elements.tasks.innerHTML = "";
                if (state.tasks.length === 0) {
                    const empty = document.createElement("div");
                    empty.className = "empty";
                    empty.textContent = "No tasks";
                    elements.tasks.appendChild(empty);
                    return;
                }

                for (const task of state.tasks) {
                    const item = document.createElement("label");
                    item.className = "task" + (task.done ? " done" : "");

                    const checkbox = document.createElement("input");
                    checkbox.type = "checkbox";
                    checkbox.checked = task.done;
                    checkbox.addEventListener("change", () => {
                        task.done = checkbox.checked;
                        addLog((task.done ? "Done: " : "Open: ") + task.title);
                        render();
                    });

                    const title = document.createElement("span");
                    title.textContent = task.title;

                    const remove = document.createElement("button");
                    remove.type = "button";
                    remove.className = "danger";
                    remove.textContent = "Remove";
                    remove.addEventListener("click", () => {
                        state.tasks = state.tasks.filter((item) => item.id !== task.id);
                        addLog("Removed: " + task.title);
                        render();
                    });

                    item.append(checkbox, title, remove);
                    elements.tasks.appendChild(item);
                }
            }

            function render() {
                document.documentElement.dataset.theme = state.theme;
                renderStats();
                renderTasks();
            }

            document.getElementById("tick").addEventListener("click", () => {
                state.count += 1;
                addLog("Count " + state.count);
                renderStats();
            });

            document.getElementById("theme").addEventListener("click", () => {
                state.theme = state.theme === "light" ? "dark" : "light";
                addLog("Theme " + state.theme);
                render();
            });

            document.getElementById("reset").addEventListener("click", () => {
                state.count = 0;
                state.tasks = [];
                addLog("Reset");
                render();
            });

            document.getElementById("taskForm").addEventListener("submit", (event) => {
                event.preventDefault();
                const title = elements.taskInput.value.trim();
                if (!title) {
                    elements.taskInput.focus();
                    return;
                }
                state.tasks.push({ id: state.nextTaskId, title, done: false });
                state.nextTaskId += 1;
                elements.taskInput.value = "";
                addLog("Added: " + title);
                render();
            });

            function updateClock() {
                elements.clock.textContent = new Date().toLocaleTimeString();
            }

            updateClock();
            setInterval(updateClock, 1000);
            addLog("Started");
            render();
        </script>
    </body>
</html>
